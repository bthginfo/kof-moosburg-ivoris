databases:
  - name: kfo-moosburg-db
    plan: starter
    databaseName: kfo_moosburg
    user: kfo_admin

services:
  - type: web
    name: kfo-moosburg-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kfo-moosburg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://kfo-moosburg.de
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
